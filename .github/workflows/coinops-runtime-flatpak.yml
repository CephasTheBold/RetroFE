name: CoinOPS Runtime Flatpak

on:
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-24.04
    name: Build CoinOPS Runtime Flatpak x86_64

    steps:
      # ------------------------------------------------------------
      # Source
      # ------------------------------------------------------------

      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Build RetroFE exactly like the known-working AppImage build
      # ------------------------------------------------------------

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: |
            cmake
            zlib1g-dev
            libglib2.0-0
            libglib2.0-dev
            libsdl2-2.0
            libsdl2-mixer-2.0
            libsdl2-image-2.0
            libsdl2-ttf-2.0
            libsdl2-dev
            libsdl2-mixer-dev
            libsdl2-image-dev
            libsdl2-ttf-dev
            libgstreamer1.0
            libgstreamer1.0-dev
            libgstreamer-plugins-base1.0-dev
            gstreamer1.0-plugins-base
            gstreamer1.0-plugins-good
            gstreamer1.0-libav
            libminizip-dev
            libwebp-dev
            libusb-1.0-0
            libusb-1.0-0-dev
            libevdev-dev
            libserialport-dev
            libcurl4-openssl-dev
            flatpak
            flatpak-builder
          version: ubuntu-24.04

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            zlib1g-dev \
            libglib2.0-0 \
            libglib2.0-dev \
            libsdl2-2.0 \
            libsdl2-mixer-2.0 \
            libsdl2-image-2.0 \
            libsdl2-ttf-2.0 \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libgstreamer1.0 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-libav \
            libminizip-dev \
            libwebp-dev \
            libusb-1.0-0 \
            libusb-1.0-0-dev \
            libevdev-dev \
            libserialport-dev
            libcurl4-openssl-dev
            flatpak \
            flatpak-builder

      - name: Configure RetroFE
        run: |
          cmake RetroFE/Source -BRetroFE/Build

      - name: Build RetroFE
        run: |
          cmake --build RetroFE/Build

      # ------------------------------------------------------------
      # Use linuxdeploy to create the same dependency-complete AppDir
      # used by the existing AppImage workflow.
      #
      # Important: no --output appimage here.
      # We want the unpacked AppDir as input to Flatpak.
      # ------------------------------------------------------------

      - name: Install linuxdeploy
        run: |
          wget \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -O linuxdeploy-x86_64.AppImage

          chmod +x linuxdeploy-x86_64.AppImage

      - name: Install linuxdeploy GStreamer plugin
        run: |
          wget \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gstreamer/refs/heads/master/linuxdeploy-plugin-gstreamer.sh

          chmod +x linuxdeploy-plugin-gstreamer.sh

      - name: Stage RetroFE runtime
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --executable RetroFE/Build/retrofe \
            --appdir RetroFE/Build/AppDir \
            --plugin gstreamer \
            --desktop-file Package/Environment/Linux/retrofe.desktop \
            --icon-file Package/Environment/Common/RetroFE.png

          echo "Contents of staged AppDir:"
          find RetroFE/Build/AppDir -maxdepth 3 -type f | sort | head -200

      # ------------------------------------------------------------
      # Create the initial CoinOPS bootstrap.
      #
      # For version 0 this simply executes RetroFE's staged AppRun.
      # Later this becomes:
      #
      #   coinops-launcher --pack <id>
      #       -> locate data pack
      #       -> set RetroFE root
      #       -> launch RetroFE
      #
      # ------------------------------------------------------------

      - name: Create CoinOPS runtime launcher
        run: |
          mkdir -p Packaging/Flatpak

          cat > Packaging/Flatpak/coinops-launcher <<'EOF'
          #!/bin/sh
          set -eu

          exec /app/retrofe/AppRun "$@"
          EOF

          chmod +x Packaging/Flatpak/coinops-launcher

      # ------------------------------------------------------------
      # Create Flatpak manifest.
      #
      # We initially retain the complete linuxdeploy AppDir unchanged
      # under /app/retrofe. This minimizes differences from the
      # already-working AppImage.
      # ------------------------------------------------------------

      - name: Create Flatpak manifest
        run: |
          cat > Packaging/Flatpak/org.coinops.Runtime.yml <<'EOF'
          id: org.coinops.Runtime

          runtime: org.freedesktop.Platform
          runtime-version: '25.08'
          sdk: org.freedesktop.Sdk

          command: coinops-launcher

          finish-args:
            # Display
            - --share=ipc
            - --socket=wayland
            - --socket=fallback-x11

            # Audio
            - --socket=pulseaudio

            # Controllers / input / GPU devices
            - --device=all

            # CoinOPS data may live in the user's home directory
            # or on removable Steam Deck storage.
            - --filesystem=home
            - --filesystem=/run/media

          modules:
            - name: coinops-runtime
              buildsystem: simple

              build-commands:
                - mkdir -p /app/retrofe
                - cp -a retrofe/. /app/retrofe/
                - install -Dm755 coinops-launcher /app/bin/coinops-launcher

              sources:
                - type: dir
                  path: RetroFE/Build/AppDir
                  dest: retrofe

                - type: file
                  path: Packaging/Flatpak/coinops-launcher
          EOF

          cat Packaging/Flatpak/org.coinops.Runtime.yml

      # ------------------------------------------------------------
      # Install the Flatpak SDK/runtime used to construct the package.
      # ------------------------------------------------------------

      - name: Configure Flathub
        run: |
          flatpak remote-add \
            --user \
            --if-not-exists \
            flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak SDK
        run: |
          flatpak install \
            --user \
            --noninteractive \
            flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08

      # ------------------------------------------------------------
      # Build/export to a local Flatpak repository.
      # ------------------------------------------------------------

      - name: Build CoinOPS Runtime Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --install-deps-from=flathub \
            --repo=flatpak-repo \
            flatpak-build \
            Packaging/Flatpak/org.coinops.Runtime.yml

      # ------------------------------------------------------------
      # Turn the local repository commit into one distributable file.
      #
      # The runtime repo metadata tells SteamOS where to obtain the
      # Freedesktop runtime when the user installs this bundle.
      # ------------------------------------------------------------

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            CoinOPS-Runtime-x86_64.flatpak \
            org.coinops.Runtime \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo

      # ------------------------------------------------------------
      # Basic sanity information
      # ------------------------------------------------------------

      - name: Show bundle information
        run: |
          ls -lh CoinOPS-Runtime-x86_64.flatpak
          flatpak build-bundle --help >/dev/null

      # ------------------------------------------------------------
      # GitHub Actions artifact
      # ------------------------------------------------------------

      - name: Upload CoinOPS Runtime Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: CoinOPS-Runtime-x86_64.flatpak
          path: CoinOPS-Runtime-x86_64.flatpak
          if-no-files-found: error
