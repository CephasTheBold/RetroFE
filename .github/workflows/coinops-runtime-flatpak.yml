name: CoinOPS Runtime Flatpak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04
    name: Build CoinOPS Runtime x86_64

    steps:
      # ============================================================
      # Checkout
      # ============================================================

      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # Host build dependencies
      #
      # Stock MAME is temporary. Once everything is proven, replace
      # this with a build of your custom MAME fork.
      # ============================================================

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            cmake \
            zlib1g-dev \
            libglib2.0-0 \
            libglib2.0-dev \
            libsdl2-2.0-0 \
            libsdl2-mixer-2.0-0 \
            libsdl2-image-2.0-0 \
            libsdl2-ttf-2.0-0 \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libgstreamer1.0-0 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-libav \
            libminizip-dev \
            libwebp-dev \
            libusb-1.0-0 \
            libusb-1.0-0-dev \
            libevdev-dev \
            libudev-dev \
            libserialport-dev \
            libcurl4-openssl-dev \
            mame \
            patchelf \
            strace \
            dbus-x11 \
            wget \
            flatpak \
            flatpak-builder

      # ============================================================
      # Cache RetroFE build
      # ============================================================

      - name: Cache RetroFE build
        uses: actions/cache@v4
        with:
          path: RetroFE/Build
          key: retrofe-flatpak-build-${{ runner.os }}-${{ hashFiles('RetroFE/Source/**', 'RetroFE/CMake/**', 'RetroFE/ThirdParty/**') }}
          restore-keys: |
            retrofe-flatpak-build-${{ runner.os }}-

      # ============================================================
      # Build RetroFE
      # ============================================================

      - name: Configure RetroFE
        run: |
          cmake RetroFE/Source -BRetroFE/Build

      - name: Build RetroFE
        run: |
          cmake --build RetroFE/Build --parallel

      # ============================================================
      # Locate binaries
      # ============================================================

      - name: Locate binaries
        id: binaries
        run: |
          RETROFE_BINARY="$PWD/RetroFE/Build/retrofe"
          MAME_BINARY="$(command -v mame)"

          if [ ! -x "$RETROFE_BINARY" ]; then
            echo "RetroFE binary not found:"
            echo "$RETROFE_BINARY"
            exit 1
          fi

          if [ -z "$MAME_BINARY" ] || [ ! -x "$MAME_BINARY" ]; then
            echo "MAME binary not found"
            exit 1
          fi

          echo "RetroFE: $RETROFE_BINARY"
          echo "MAME:    $MAME_BINARY"

          "$RETROFE_BINARY" --version || true
          "$MAME_BINARY" -version || true

          echo "retrofe=$RETROFE_BINARY" >> "$GITHUB_OUTPUT"
          echo "mame=$MAME_BINARY" >> "$GITHUB_OUTPUT"

      # ============================================================
      # Download quick-sharun
      #
      # We already proved this can collect RetroFE + MAME into one
      # self-contained runtime environment.
      #
      # Here we use it only as the STAGING mechanism. The resulting
      # tree gets installed inside the Flatpak.
      # ============================================================

      - name: Install quick-sharun
        run: |
          wget \
            https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/quick-sharun.sh \
            -O quick-sharun.sh

          chmod +x quick-sharun.sh

      # ============================================================
      # Metadata used while staging
      # ============================================================

      - name: Create runtime metadata
        run: |
          mkdir -p Packaging/Flatpak

          cat > Packaging/Flatpak/coinops-runtime.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=CoinOPS Runtime
          Comment=CoinOPS Runtime
          Exec=retrofe
          Icon=coinops-runtime
          Terminal=false
          Categories=Game;
          EOF

          cp \
            Package/Environment/Common/RetroFE.png \
            Packaging/Flatpak/coinops-runtime.png

      # ============================================================
      # Stage RetroFE + MAME + dependencies
      #
      # RuntimeStage becomes a sharun environment containing:
      #
      #   RuntimeStage/
      #     sharun
      #     shared/bin/retrofe
      #     shared/bin/mame
      #     shared/lib/...
      #
      # We do NOT make an AppImage from it.
      # ============================================================

      - name: Create combined runtime stage
        env:
          RETROFE_BINARY: ${{ steps.binaries.outputs.retrofe }}
          MAME_BINARY: ${{ steps.binaries.outputs.mame }}
        run: |
          export APPDIR="$PWD/RuntimeStage"

          export DEPLOY_SDL=1
          export DEPLOY_GSTREAMER=1
          export DEPLOY_OPENGL=1

          export DESKTOP="$PWD/Packaging/Flatpak/coinops-runtime.desktop"
          export ICON="$PWD/Packaging/Flatpak/coinops-runtime.png"

          # Avoid dynamically launching MAME during dependency probing.
          # It is still packaged and its normal ELF dependencies are
          # still collected.
          export STRACE_BINARY="retrofe"
          export STRACE_TIME=5

          ./quick-sharun.sh \
            "$RETROFE_BINARY" \
            "$MAME_BINARY"

      # ============================================================
      # Verify staged runtime before Flatpak packaging
      # ============================================================

      - name: Verify staged runtime
        run: |
          echo "---- RuntimeStage ----"
          find RuntimeStage -maxdepth 3 \
            \( -name sharun -o -name retrofe -o -name mame \) \
            -print

          test -x RuntimeStage/sharun

          echo
          echo "RetroFE:"
          RuntimeStage/sharun retrofe --version || true

          echo
          echo "MAME:"
          RuntimeStage/sharun mame -version

      # ============================================================
      # CoinOPS Flatpak launcher
      #
      # Usage:
      #
      # flatpak run org.coinops.Runtime "/home/deck/CoinOPS Arise"
      #
      # RETROFE_PATH points RetroFE itself at the external CoinOPS
      # build.
      #
      # Your new RetroFE executable handling means:
      #
      #   executable = mame
      #
      # remains "mame", allowing execvp() to resolve the bundled MAME
      # from the sharun PATH.
      # ============================================================

      - name: Create CoinOPS runtime launcher
        run: |
          mkdir -p Packaging/Flatpak

          cat > Packaging/Flatpak/coinops-launcher <<'EOF'
          #!/bin/sh
          set -eu

          if [ "$#" -lt 1 ]; then
              echo "Usage:"
              echo "  flatpak run org.coinops.Runtime <CoinOPS build folder>"
              echo
              echo "Example:"
              echo '  flatpak run org.coinops.Runtime "$HOME/CoinOPS Arise"'
              exit 1
          fi

          COINOPS_ROOT="$1"
          shift

          if [ ! -d "$COINOPS_ROOT" ]; then
              echo "CoinOPS build folder not found:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          if [ ! -f "$COINOPS_ROOT/settings.conf" ]; then
              echo "settings.conf not found in CoinOPS build folder:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          export RETROFE_PATH="$COINOPS_ROOT"

          cd "$COINOPS_ROOT"

          exec /app/runtime/sharun retrofe "$@"
          EOF

          chmod +x Packaging/Flatpak/coinops-launcher

      # ============================================================
      # Create Flatpak manifest
      #
      # Manifest is generated at repository root so RuntimeStage and
      # Packaging paths resolve cleanly.
      # ============================================================

      - name: Create Flatpak manifest
        run: |
          cat > org.coinops.Runtime.yml <<'EOF'
          app-id: org.coinops.Runtime

          runtime: org.freedesktop.Platform
          runtime-version: '25.08'
          sdk: org.freedesktop.Sdk

          command: coinops-launcher

          finish-args:
            - --share=ipc
            - --share=network

            - --socket=wayland
            - --socket=fallback-x11
            - --socket=pulseaudio

            - --device=all

            - --filesystem=home
            - --filesystem=/run/media
            - --filesystem=/media
            - --filesystem=/mnt

          modules:
            - name: coinops-runtime
              buildsystem: simple

              build-commands:
                - mkdir -p /app/runtime
                - cp -a runtime/. /app/runtime/

                - install -Dm755 coinops-launcher /app/bin/coinops-launcher

                - install -Dm644 coinops-runtime.desktop /app/share/applications/org.coinops.Runtime.desktop

                - install -Dm644 coinops-runtime.png /app/share/icons/hicolor/256x256/apps/org.coinops.Runtime.png

              sources:
                - type: dir
                  path: RuntimeStage
                  dest: runtime

                - type: file
                  path: Packaging/Flatpak/coinops-launcher

                - type: file
                  path: Packaging/Flatpak/coinops-runtime.desktop

                - type: file
                  path: Packaging/Flatpak/coinops-runtime.png
          EOF

          cat org.coinops.Runtime.yml

      # ============================================================
      # Configure Flathub
      # ============================================================

      - name: Configure Flathub
        run: |
          flatpak remote-add \
            --user \
            --if-not-exists \
            flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      # ============================================================
      # Install build SDK/runtime
      # ============================================================

      - name: Install Flatpak SDK
        run: |
          flatpak install \
            --user \
            --noninteractive \
            flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08

      # ============================================================
      # Cache flatpak-builder data
      # ============================================================

      - name: Cache Flatpak builder
        uses: actions/cache@v4
        with:
          path: .flatpak-builder
          key: coinops-flatpak-builder-${{ runner.os }}-25.08-v1
          restore-keys: |
            coinops-flatpak-builder-${{ runner.os }}-25.08-

      # ============================================================
      # Build Flatpak repository
      # ============================================================

      - name: Build CoinOPS Runtime Flatpak
        run: |
          rm -rf build-dir repo

          flatpak-builder \
            --user \
            --force-clean \
            --repo=repo \
            --install-deps-from=flathub \
            build-dir \
            org.coinops.Runtime.yml

      # ============================================================
      # Build distributable .flatpak bundle
      # ============================================================

      - name: Build Flatpak bundle
        run: |
          flatpak build-bundle \
            repo \
            CoinOPS-Runtime-x86_64.flatpak \
            org.coinops.Runtime \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo

          ls -lh CoinOPS-Runtime-x86_64.flatpak

      # ============================================================
      # Upload artifact
      # ============================================================

      - name: Upload CoinOPS Runtime Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: CoinOPS-Runtime-x86_64.flatpak
          path: CoinOPS-Runtime-x86_64.flatpak
          if-no-files-found: error
