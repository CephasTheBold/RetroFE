name: CoinOPS Runtime AppImage Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04
    name: Build CoinOPS Runtime x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Cache downloaded apt packages
      # ------------------------------------------------------------

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: |
            cmake
            zlib1g-dev
            libglib2.0-0
            libglib2.0-dev
            libsdl2-2.0-0
            libsdl2-mixer-2.0-0
            libsdl2-image-2.0-0
            libsdl2-ttf-2.0-0
            libsdl2-dev
            libsdl2-mixer-dev
            libsdl2-image-dev
            libsdl2-ttf-dev
            libgstreamer1.0-0
            libgstreamer1.0-dev
            libgstreamer-plugins-base1.0-dev
            gstreamer1.0-plugins-base
            gstreamer1.0-plugins-good
            gstreamer1.0-libav
            libminizip-dev
            libwebp-dev
            libusb-1.0-0
            libusb-1.0-0-dev
            libevdev-dev
            libudev-dev
            libserialport-dev
            libcurl4-openssl-dev
            mame
            patchelf
            strace
            dbus-x11
            wget
          version: ubuntu-24.04-coinops-runtime-v1

      # ------------------------------------------------------------
      # Install RetroFE build dependencies + stock MAME
      # ------------------------------------------------------------

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update

          sudo apt-get install -y \
            cmake \
            zlib1g-dev \
            libglib2.0-0 \
            libglib2.0-dev \
            libsdl2-2.0-0 \
            libsdl2-mixer-2.0-0 \
            libsdl2-image-2.0-0 \
            libsdl2-ttf-2.0-0 \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libgstreamer1.0-0 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-libav \
            libminizip-dev \
            libwebp-dev \
            libusb-1.0-0 \
            libusb-1.0-0-dev \
            libevdev-dev \
            libudev-dev \
            libserialport-dev \
            libcurl4-openssl-dev \
            mame \
            patchelf \
            strace \
            dbus-x11 \
            wget

      # ------------------------------------------------------------
      # Cache RetroFE object files
      # ------------------------------------------------------------

      - name: Cache RetroFE build
        uses: actions/cache@v4
        with:
          path: RetroFE/Build
          key: retrofe-runtime-build-${{ runner.os }}-${{ hashFiles('RetroFE/Source/**', 'RetroFE/CMake/**', 'RetroFE/ThirdParty/**') }}
          restore-keys: |
            retrofe-runtime-build-${{ runner.os }}-

      # ------------------------------------------------------------
      # Build RetroFE
      # ------------------------------------------------------------

      - name: Configure RetroFE
        run: |
          cmake RetroFE/Source -BRetroFE/Build

      - name: Build RetroFE
        run: |
          cmake --build RetroFE/Build --parallel

      # ------------------------------------------------------------
      # Locate and verify both binaries
      # ------------------------------------------------------------

      - name: Locate binaries
        id: binaries
        run: |
          RETROFE_BINARY="$PWD/RetroFE/Build/retrofe"
          MAME_BINARY="$(command -v mame)"

          if [ ! -x "$RETROFE_BINARY" ]; then
            echo "RetroFE binary not found or not executable:"
            echo "$RETROFE_BINARY"
            exit 1
          fi

          if [ -z "$MAME_BINARY" ] || [ ! -x "$MAME_BINARY" ]; then
            echo "MAME binary not found"
            exit 1
          fi

          echo "RetroFE: $RETROFE_BINARY"
          echo "MAME:    $MAME_BINARY"

          "$MAME_BINARY" -version || true

          echo "retrofe=$RETROFE_BINARY" >> "$GITHUB_OUTPUT"
          echo "mame=$MAME_BINARY" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------
      # Download quick-sharun
      # ------------------------------------------------------------

      - name: Install quick-sharun
        run: |
          wget \
            https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/quick-sharun.sh \
            -O quick-sharun.sh

          chmod +x quick-sharun.sh

      # ------------------------------------------------------------
      # Create desktop metadata
      #
      # We generate our own entry because this is now CoinOPS Runtime,
      # not a normal standalone RetroFE AppImage.
      # ------------------------------------------------------------

      - name: Create AppImage metadata
        run: |
          mkdir -p Packaging/Runtime

          cat > Packaging/Runtime/coinops-runtime.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=CoinOPS Runtime
          Comment=Portable CoinOPS Runtime
          Exec=retrofe
          Icon=coinops-runtime
          Terminal=false
          Categories=Game;
          EOF

          cp Package/Environment/Common/RetroFE.png \
            Packaging/Runtime/coinops-runtime.png

      # ------------------------------------------------------------
      # Deploy RetroFE + MAME into ONE sharun environment
      #
      # quick-sharun inspects both executables and collects their
      # required libraries into the same AppDir.
      # ------------------------------------------------------------

      - name: Create combined CoinOPS Runtime AppDir
        env:
          RETROFE_BINARY: ${{ steps.binaries.outputs.retrofe }}
          MAME_BINARY: ${{ steps.binaries.outputs.mame }}
        run: |
          export APPDIR="$PWD/AppDir"

          export DEPLOY_SDL=1
          export DEPLOY_GSTREAMER=1
          export DEPLOY_OPENGL=1

          export DESKTOP="$PWD/Packaging/Runtime/coinops-runtime.desktop"
          export ICON="$PWD/Packaging/Runtime/coinops-runtime.png"

          ./quick-sharun.sh \
            "$RETROFE_BINARY" \
            "$MAME_BINARY"

      # ------------------------------------------------------------
      # Show us exactly what quick-sharun produced.
      #
      # This is useful during the experiment because we want to verify
      # the exact internal names/paths before integrating custom MAME.
      # ------------------------------------------------------------

      - name: Inspect AppDir
        run: |
          echo "---- AppDir root ----"
          ls -la AppDir

          echo
          echo "---- AppDir/bin ----"
          ls -la AppDir/bin || true

          echo
          echo "---- sharun ----"
          find AppDir -maxdepth 2 \
            \( -name sharun -o -name retrofe -o -name mame \) \
            -print

      # ------------------------------------------------------------
      # Create our own CoinOPS AppRun
      #
      # Usage:
      #
      #   ./CoinOPS-Runtime-x86_64.AppImage "/home/deck/CoinOPS Arise"
      #
      # RETROFE_PATH tells RetroFE where settings.conf, collections,
      # layouts, media, etc. live.
      #
      # IMPORTANT:
      # RetroFE is launched THROUGH sharun rather than directly, so the
      # bundled libraries, GStreamer environment and PATH are active.
      #
      # That PATH should also allow RetroFE to later execute:
      #
      #   mame
      #
      # from inside the same AppImage.
      # ------------------------------------------------------------

      - name: Create CoinOPS runtime launcher
        run: |
          rm -f AppDir/AppRun

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          set -eu

          if [ "$#" -lt 1 ]; then
              echo "Usage:"
              echo "  CoinOPS-Runtime.AppImage <CoinOPS build folder>"
              echo
              echo "Example:"
              echo '  ./CoinOPS-Runtime.AppImage "$HOME/CoinOPS Arise"'
              exit 1
          fi

          COINOPS_ROOT="$1"
          shift

          if [ ! -d "$COINOPS_ROOT" ]; then
              echo "CoinOPS build folder not found:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          if [ ! -f "$COINOPS_ROOT/settings.conf" ]; then
              echo "settings.conf not found in CoinOPS build folder:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          export RETROFE_PATH="$COINOPS_ROOT"

          cd "$COINOPS_ROOT"

          exec "$APPDIR/sharun" retrofe "$@"
          EOF

          chmod +x AppDir/AppRun

      # ------------------------------------------------------------
      # Verify the staged runtime before creating the AppImage
      # ------------------------------------------------------------

      - name: Verify staged runtime
        run: |
          test -x AppDir/AppRun
          test -x AppDir/sharun

          echo "Checking RetroFE through sharun..."
          AppDir/sharun retrofe --version || true

          echo
          echo "Checking MAME through sharun..."
          AppDir/sharun mame -version

      # ------------------------------------------------------------
      # Build final AppImage
      #
      # This follows the same basic two-stage method used by the
      # pkgforge MAME-AppImage project:
      #
      #   quick-sharun <binaries>
      #   quick-sharun --make-appimage
      # ------------------------------------------------------------

      - name: Build CoinOPS Runtime AppImage
        run: |
          export APPDIR="$PWD/AppDir"
          export APPNAME="CoinOPS-Runtime"
          export ARCH="x86_64"
          export OUTPATH="$PWD/dist"

          export DESKTOP="$PWD/Packaging/Runtime/coinops-runtime.desktop"
          export ICON="$PWD/Packaging/Runtime/coinops-runtime.png"

          mkdir -p "$OUTPATH"

          ./quick-sharun.sh --make-appimage

          echo
          echo "---- Generated files ----"
          find dist -maxdepth 1 -type f -ls

      # ------------------------------------------------------------
      # Give the artifact a predictable filename
      # ------------------------------------------------------------

      - name: Normalize AppImage filename
        run: |
          APPIMAGE="$(find dist -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"

          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage was generated"
            exit 1
          fi

          mv "$APPIMAGE" CoinOPS-Runtime-x86_64.AppImage
          chmod +x CoinOPS-Runtime-x86_64.AppImage

          ls -lh CoinOPS-Runtime-x86_64.AppImage

      # ------------------------------------------------------------
      # Upload artifact
      # ------------------------------------------------------------

      - name: Upload CoinOPS Runtime AppImage
        uses: actions/upload-artifact@v4
        with:
          name: CoinOPS-Runtime-x86_64.AppImage
          path: CoinOPS-Runtime-x86_64.AppImage
          if-no-files-found: error
