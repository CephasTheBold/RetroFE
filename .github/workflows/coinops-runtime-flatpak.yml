name: CoinOPS Runtime Flatpak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04
    name: Build CoinOPS Runtime x86_64

    steps:
      # ============================================================
      # Checkout RetroFE
      # ============================================================

      - name: Checkout RetroFE
        uses: actions/checkout@v4

      # ============================================================
      # Checkout custom MAME fork
      # ============================================================

      - name: Checkout MAME fork
        uses: actions/checkout@v4
        with:
          repository: CoinOPS-Official/MAME-FFMpeg
          ref: mame0285-local
          path: MAME
          token: ${{ secrets.MAME_REPO_TOKEN }}

      # ============================================================
      # Determine exact MAME revision
      # ============================================================

      - name: Get MAME revision
        id: mame-rev
        working-directory: MAME
        run: |
          MAME_SHA="$(git rev-parse HEAD)"

          echo "MAME revision: $MAME_SHA"
          echo "sha=$MAME_SHA" >> "$GITHUB_OUTPUT"

      # ============================================================
      # Restore cached MAME binary
      #
      # The cache stores the original, unmodified MAME binary.
      # A separate stripped copy is created later for packaging.
      # ============================================================

      - name: Cache custom MAME
        id: cache-mame
        uses: actions/cache@v4
        with:
          path: MAME/mame
          key: mame-linux-x64-${{ steps.mame-rev.outputs.sha }}-ffmpeg0-v1

      # ============================================================
      # Host build/staging dependencies
      #
      # These packages exist on the GitHub runner so RetroFE/MAME
      # can build and quick-sharun can discover runtime dependencies.
      #
      # Their presence here does not automatically mean they are
      # included in the final Flatpak.
      # ============================================================

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            git \
            python3 \
            cmake \
            zlib1g-dev \
            libglib2.0-dev \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libfontconfig-dev \
            libpulse-dev \
            libgstreamer1.0-0 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-libav \
            libminizip-dev \
            libwebp-dev \
            libusb-1.0-0-dev \
            libevdev-dev \
            libudev-dev \
            libserialport-dev \
            libcurl4-openssl-dev \
            patchelf \
            strace \
            wget \
            flatpak \
            flatpak-builder

      # ============================================================
      # Cache RetroFE build
      # ============================================================

      - name: Cache RetroFE build
        uses: actions/cache@v4
        with:
          path: RetroFE/Build
          key: retrofe-flatpak-build-${{ runner.os }}-${{ hashFiles('RetroFE/Source/**', 'RetroFE/CMake/**', 'RetroFE/ThirdParty/**') }}
          restore-keys: |
            retrofe-flatpak-build-${{ runner.os }}-

      # ============================================================
      # Build RetroFE
      # ============================================================

      - name: Configure RetroFE
        run: |
          cmake RetroFE/Source -BRetroFE/Build

      - name: Build RetroFE
        run: |
          cmake --build RetroFE/Build --parallel

      # ============================================================
      # Build custom MAME
      #
      # Skipped when the exact MAME revision is restored from cache.
      #
      # Disabled:
      #   - FFmpeg layout/video support
      #   - auxiliary tools
      #   - tests
      #   - benchmarks
      #   - Qt debugger
      #   - MIDI
      #   - PortAudio
      #   - TAP/TUN networking
      #   - PCAP networking
      # ============================================================

      - name: Build custom MAME
        if: steps.cache-mame.outputs.cache-hit != 'true'
        working-directory: MAME
        run: |
          echo "No cached MAME binary found."
          echo "Building MAME revision:"
          git rev-parse HEAD

          make \
            -j3 \
            REGENIE=1 \
            USE_FFMPEG=0 \
            TOOLS=0 \
            TESTS=0 \
            BENCHMARKS=0 \
            USE_QTDEBUG=0 \
            NO_USE_MIDI=1 \
            NO_USE_PORTAUDIO=1 \
            USE_TAPTUN=0 \
            USE_PCAP=0

          test -x mame

      # ============================================================
      # Verify original/cached MAME
      # ============================================================

      - name: Verify custom MAME
        working-directory: MAME
        run: |
          test -x mame

          echo "MAME cache hit:"
          echo "${{ steps.cache-mame.outputs.cache-hit }}"

          echo
          echo "Custom MAME version:"
          ./mame -version

          echo
          echo "MAME source revision:"
          git rev-parse HEAD

          echo
          echo "Original MAME binary size:"
          ls -lh mame
          du -h mame

      # ============================================================
      # Prepare runtime binaries
      #
      # Keep MAME/mame untouched so the existing cache remains valid.
      #
      # Create MAME/mame-runtime as a stripped packaging copy.
      # ============================================================

      - name: Prepare runtime binaries
        id: binaries
        run: |
          RETROFE_BINARY="$PWD/RetroFE/Build/retrofe"
          MAME_ORIGINAL="$PWD/MAME/mame"
          MAME_RUNTIME="$PWD/MAME/mame-runtime"

          if [ ! -x "$RETROFE_BINARY" ]; then
            echo "RetroFE binary not found:"
            echo "$RETROFE_BINARY"
            exit 1
          fi

          if [ ! -x "$MAME_ORIGINAL" ]; then
            echo "Custom MAME binary not found:"
            echo "$MAME_ORIGINAL"
            exit 1
          fi

          rm -f "$MAME_RUNTIME"

          echo "============================================================"
          echo "MAME BEFORE STRIPPING"
          echo "============================================================"

          ls -lh "$MAME_ORIGINAL"
          du -h "$MAME_ORIGINAL"

          cp -a "$MAME_ORIGINAL" "$MAME_RUNTIME"

          strip --strip-unneeded "$MAME_RUNTIME"

          echo
          echo "============================================================"
          echo "MAME AFTER STRIPPING"
          echo "============================================================"

          ls -lh "$MAME_RUNTIME"
          du -h "$MAME_RUNTIME"

          echo
          echo "Verifying stripped MAME:"
          "$MAME_RUNTIME" -version

          echo
          echo "RetroFE:"
          "$RETROFE_BINARY" --version || true

          echo "retrofe=$RETROFE_BINARY" >> "$GITHUB_OUTPUT"
          echo "mame=$MAME_RUNTIME" >> "$GITHUB_OUTPUT"

      # ============================================================
      # Inspect direct binary dependencies
      # ============================================================

      - name: Inspect binary dependencies
        env:
          RETROFE_BINARY: ${{ steps.binaries.outputs.retrofe }}
          MAME_BINARY: ${{ steps.binaries.outputs.mame }}
        run: |
          echo "============================================================"
          echo "RetroFE direct dependencies"
          echo "============================================================"

          ldd "$RETROFE_BINARY" | sort

          echo
          echo "============================================================"
          echo "MAME direct dependencies"
          echo "============================================================"

          ldd "$MAME_BINARY" | sort

          echo
          echo "============================================================"
          echo "SDL linkage"
          echo "============================================================"

          echo "RetroFE:"
          ldd "$RETROFE_BINARY" | grep -Ei 'SDL2|SDL3' || true

          echo
          echo "MAME:"
          ldd "$MAME_BINARY" | grep -Ei 'SDL2|SDL3' || true

      # ============================================================
      # Download quick-sharun
      # ============================================================

      - name: Install quick-sharun
        run: |
          wget \
            https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/quick-sharun.sh \
            -O quick-sharun.sh

          chmod +x quick-sharun.sh

      # ============================================================
      # Runtime metadata
      # ============================================================

      - name: Create runtime metadata
        run: |
          mkdir -p Packaging/Flatpak

          cat > Packaging/Flatpak/coinops-runtime.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=CoinOPS Runtime
          Comment=CoinOPS Runtime
          Exec=coinops-launcher
          Icon=org.coinops.Runtime
          Terminal=false
          Categories=Game;
          EOF

          cp \
            Package/Environment/Common/RetroFE.png \
            Packaging/Flatpak/coinops-runtime.png

      # ============================================================
      # Stage RetroFE + stripped MAME + dependencies
      #
      # DEPLOY_SDL is intentionally NOT enabled.
      #
      # SDL dependencies are discovered naturally from the binaries.
      #
      # DEPLOY_OPENGL is intentionally NOT enabled.
      #
      # Explicit OpenGL deployment previously pulled a large Ubuntu
      # Mesa/LLVM/OpenCL stack into the Flatpak.
      #
      # DEPLOY_GSTREAMER remains enabled because RetroFE dynamically
      # loads GStreamer plugins.
      # ============================================================

      - name: Create combined runtime stage
        env:
          RETROFE_BINARY: ${{ steps.binaries.outputs.retrofe }}
          MAME_BINARY: ${{ steps.binaries.outputs.mame }}
        run: |
          rm -rf RuntimeStage

          export APPDIR="$PWD/RuntimeStage"

          export DEPLOY_GSTREAMER=1

          export DESKTOP="$PWD/Packaging/Flatpak/coinops-runtime.desktop"
          export ICON="$PWD/Packaging/Flatpak/coinops-runtime.png"

          # Runtime-probe RetroFE only.
          #
          # MAME is still packaged and its normal ELF dependencies
          # are collected by quick-sharun.
          export STRACE_BINARY="retrofe"
          export STRACE_TIME=5

          ./quick-sharun.sh \
            "$RETROFE_BINARY" \
            "$MAME_BINARY"

      # ============================================================
      # Analyze staged runtime
      # ============================================================

      - name: Analyze runtime stage
        run: |
          echo "============================================================"
          echo "TOTAL RUNTIME STAGE"
          echo "============================================================"

          du -sh RuntimeStage

          echo
          echo "============================================================"
          echo "TOP DIRECTORY SIZES"
          echo "============================================================"

          du -h -d 2 RuntimeStage 2>/dev/null \
            | sort -h \
            | tail -80

          echo
          echo "============================================================"
          echo "50 LARGEST FILES"
          echo "============================================================"

          find RuntimeStage -type f -printf '%s %p\n' \
            | sort -nr \
            | head -50 \
            | numfmt --field=1 --to=iec || true

          echo
          echo "============================================================"
          echo "GSTREAMER"
          echo "============================================================"

          GST_COUNT=0

          while IFS= read -r GST_DIR; do
            [ -d "$GST_DIR" ] || continue

            echo
            echo "$GST_DIR"

            COUNT="$(find "$GST_DIR" -maxdepth 1 -type f -name '*.so' | wc -l)"
            GST_COUNT=$((GST_COUNT + COUNT))

            echo "Plugins: $COUNT"
            du -sh "$GST_DIR"
          done <<EOF
          $(find RuntimeStage -type d -path '*/gstreamer-1.0' | sort)
          EOF

          echo
          echo "Total GStreamer plugins: $GST_COUNT"

          echo
          echo "============================================================"
          echo "SDL LIBRARIES"
          echo "============================================================"

          find RuntimeStage \
            \( -type f -o -type l \) \
            \( -iname '*SDL2*' -o -iname '*SDL3*' \) \
            -print \
            | sort || true

          echo
          echo "============================================================"
          echo "OPENGL / MESA / LLVM / OPENCL"
          echo "============================================================"

          find RuntimeStage \
            \( -type f -o -type l \) \
            \( \
              -iname '*LLVM*' \
              -o -iname '*OpenCL*' \
              -o -iname '*GLX*' \
              -o -iname '*EGL*' \
              -o -iname '*mesa*' \
              -o -iname '*dri.so' \
            \) \
            -print \
            | sort || true

          echo
          echo "============================================================"
          echo "GLIBC / LOADER"
          echo "============================================================"

          find RuntimeStage \
            \( -type f -o -type l \) \
            \( \
              -name 'libc.so*' \
              -o -name 'ld-linux*' \
              -o -name 'libpthread.so*' \
              -o -name 'libm.so*' \
            \) \
            -print \
            | sort || true

      # ============================================================
      # Verify staged runtime
      # ============================================================

      - name: Verify staged runtime
        run: |
          echo "---- RuntimeStage binaries ----"

          find RuntimeStage -maxdepth 3 \
            \( -name sharun -o -name retrofe -o -name mame -o -name mame-runtime \) \
            -print

          test -x RuntimeStage/sharun

          echo
          echo "RetroFE:"
          RuntimeStage/sharun retrofe --version || true

          echo
          echo "Custom MAME:"

          if RuntimeStage/sharun mame -version; then
            :
          elif RuntimeStage/sharun mame-runtime -version; then
            :
          else
            echo "Unable to execute staged MAME."
            exit 1
          fi

      # ============================================================
      # CoinOPS runtime launcher
      # ============================================================

      - name: Create CoinOPS runtime launcher
        run: |
          mkdir -p Packaging/Flatpak

          cat > Packaging/Flatpak/coinops-launcher <<'EOF'
          #!/bin/sh
          set -eu

          if [ "$#" -lt 1 ]; then
              echo "Usage:"
              echo "  flatpak run org.coinops.Runtime <CoinOPS build folder>"
              echo
              echo "Example:"
              echo '  flatpak run org.coinops.Runtime "$HOME/CoinOPS Arise"'
              exit 1
          fi

          COINOPS_ROOT="$1"
          shift

          if [ ! -d "$COINOPS_ROOT" ]; then
              echo "CoinOPS build folder not found:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          if [ ! -f "$COINOPS_ROOT/settings.conf" ]; then
              echo "settings.conf not found in CoinOPS build folder:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          export RETROFE_PATH="$COINOPS_ROOT"

          cd "$COINOPS_ROOT"

          exec /app/runtime/sharun retrofe "$@"
          EOF

          chmod +x Packaging/Flatpak/coinops-launcher

      # ============================================================
      # Ensure packaged MAME command is named "mame"
      #
      # quick-sharun may preserve the source basename "mame-runtime".
      #
      # RetroFE launcher.conf uses:
      #
      #   executable = mame
      #
      # Therefore provide a stable "mame" command inside Sharun.
      # ============================================================

      - name: Ensure staged MAME command name
        run: |
          if [ -e RuntimeStage/bin/mame ]; then
            echo "RuntimeStage/bin/mame already exists."
          elif [ -e RuntimeStage/bin/mame-runtime ]; then
            ln -s mame-runtime RuntimeStage/bin/mame
          fi

          if [ -e RuntimeStage/shared/bin/mame ]; then
            echo "RuntimeStage/shared/bin/mame already exists."
          elif [ -e RuntimeStage/shared/bin/mame-runtime ]; then
            ln -s mame-runtime RuntimeStage/shared/bin/mame
          fi

          echo
          echo "MAME command entries:"

          find RuntimeStage/bin RuntimeStage/shared/bin \
            -maxdepth 1 \
            \( -name 'mame' -o -name 'mame-runtime' \) \
            -ls 2>/dev/null || true

          echo
          echo "Verify final mame command:"
          RuntimeStage/sharun mame -version

      # ============================================================
      # Create Flatpak manifest
      # ============================================================

      - name: Create Flatpak manifest
        run: |
          cat > org.coinops.Runtime.yml <<'EOF'
          app-id: org.coinops.Runtime

          runtime: org.freedesktop.Platform
          runtime-version: '25.08'
          sdk: org.freedesktop.Sdk

          command: coinops-launcher

          finish-args:
            - --share=ipc
            - --share=network

            - --socket=wayland
            - --socket=fallback-x11
            - --socket=pulseaudio

            - --device=all

            - --filesystem=home
            - --filesystem=/run/media
            - --filesystem=/media
            - --filesystem=/mnt

          modules:
            - name: coinops-runtime
              buildsystem: simple

              build-commands:
                - mkdir -p /app/runtime
                - cp -a runtime/. /app/runtime/

                - install -Dm755 coinops-launcher /app/bin/coinops-launcher

                - install -Dm644 coinops-runtime.desktop /app/share/applications/org.coinops.Runtime.desktop

                - install -Dm644 coinops-runtime.png /app/share/icons/hicolor/256x256/apps/org.coinops.Runtime.png

              sources:
                - type: dir
                  path: RuntimeStage
                  dest: runtime

                - type: file
                  path: Packaging/Flatpak/coinops-launcher

                - type: file
                  path: Packaging/Flatpak/coinops-runtime.desktop

                - type: file
                  path: Packaging/Flatpak/coinops-runtime.png
          EOF

          cat org.coinops.Runtime.yml

      # ============================================================
      # Configure Flathub
      # ============================================================

      - name: Configure Flathub
        run: |
          flatpak remote-add \
            --user \
            --if-not-exists \
            flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      # ============================================================
      # Install Flatpak runtime + SDK
      # ============================================================

      - name: Install Flatpak SDK
        run: |
          flatpak install \
            --user \
            --noninteractive \
            flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08

      # ============================================================
      # Cache flatpak-builder data
      #
      # Cache version bumped because packaged MAME is now stripped.
      # ============================================================

      - name: Cache Flatpak builder
        uses: actions/cache@v4
        with:
          path: .flatpak-builder
          key: coinops-flatpak-builder-${{ runner.os }}-25.08-v6
          restore-keys: |
            coinops-flatpak-builder-${{ runner.os }}-25.08-

      # ============================================================
      # Build Flatpak repository
      # ============================================================

      - name: Build CoinOPS Runtime Flatpak
        run: |
          rm -rf build-dir repo

          flatpak-builder \
            --user \
            --force-clean \
            --repo=repo \
            --install-deps-from=flathub \
            build-dir \
            org.coinops.Runtime.yml

      # ============================================================
      # Analyze built Flatpak
      # ============================================================

      - name: Analyze built Flatpak
        run: |
          echo "============================================================"
          echo "FLATPAK BUILD DIRECTORY"
          echo "============================================================"

          du -sh build-dir || true

          echo
          echo "============================================================"
          echo "INSTALLED /APP PAYLOAD"
          echo "============================================================"

          if [ -d build-dir/files ]; then
            du -sh build-dir/files

            du -h -d 3 build-dir/files 2>/dev/null \
              | sort -h \
              | tail -80
          fi

          echo
          echo "============================================================"
          echo "FLATPAK REPOSITORY"
          echo "============================================================"

          du -sh repo

      # ============================================================
      # Build distributable Flatpak bundle
      # ============================================================

      - name: Build Flatpak bundle
        run: |
          echo "Creating Flatpak bundle..."

          (
            while true; do
              echo "Still building Flatpak bundle: $(date)"
              sleep 60
            done
          ) &
          HEARTBEAT_PID=$!

          trap 'kill "$HEARTBEAT_PID" 2>/dev/null || true' EXIT

          flatpak build-bundle \
            repo \
            CoinOPS-Runtime-x86_64.flatpak \
            org.coinops.Runtime \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo

          kill "$HEARTBEAT_PID" 2>/dev/null || true
          trap - EXIT

          echo
          echo "Bundle complete:"
          ls -lh CoinOPS-Runtime-x86_64.flatpak

          echo
          echo "Bundle byte size:"
          stat --printf='%s bytes\n' CoinOPS-Runtime-x86_64.flatpak

      # ============================================================
      # Upload artifact
      # ============================================================

      - name: Upload CoinOPS Runtime Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: CoinOPS-Runtime-x86_64.flatpak
          path: CoinOPS-Runtime-x86_64.flatpak
          if-no-files-found: error
