name: CoinOPS Native Flatpak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04
    name: Build Native CoinOPS Flatpak x86_64

    steps:
      # ============================================================
      # Checkout RetroFE
      # ============================================================

      - name: Checkout RetroFE
        uses: actions/checkout@v4

      # ============================================================
      # Checkout custom MAME fork
      # ============================================================

      - name: Checkout MAME fork
        uses: actions/checkout@v4
        with:
          repository: CoinOPS-Official/MAME-FFMpeg
          ref: mame0285-local
          path: MAME
          token: ${{ secrets.MAME_REPO_TOKEN }}

      # ============================================================
      # Show exact source revisions
      # ============================================================

      - name: Show source revisions
        run: |
          echo "============================================================"
          echo "RetroFE revision"
          echo "============================================================"
          git rev-parse HEAD

          echo
          echo "============================================================"
          echo "MAME revision"
          echo "============================================================"
          git -C MAME rev-parse HEAD

      # ============================================================
      # Install host tools only
      #
      # RetroFE and MAME are compiled inside:
      #
      #   org.freedesktop.Sdk//25.08
      #
      # and are NOT linked against Ubuntu runtime libraries.
      # ============================================================

      - name: Install host build tools
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            git

      # ============================================================
      # Configure Flathub
      # ============================================================

      - name: Configure Flathub
        run: |
          flatpak remote-add \
            --user \
            --if-not-exists \
            flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      # ============================================================
      # Install matching Freedesktop runtime + SDK
      # ============================================================

      - name: Install Freedesktop 25.08 runtime and SDK
        run: |
          flatpak install \
            --user \
            --noninteractive \
            flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08

      # ============================================================
      # Inspect SDK dependency availability
      #
      # Confirmed:
      #
      #   sdl2                  2.32.70
      #   SDL2_mixer           2.8.2
      #   gstreamer            1.26.11
      #   fontconfig           2.17.1
      #   libcurl              8.15.0
      #   libusb               1.0.29
      #   libudev              257
      #   zlib                 1.3.1
      #   libwebp              1.6.0
      #
      # Missing and bundled below:
      #
      #   SDL2_image
      #   SDL2_ttf
      #   libevdev
      #   libserialport
      #   minizip
      # ============================================================

      - name: Inspect Freedesktop SDK dependencies
        run: |
          flatpak run \
            --command=sh \
            org.freedesktop.Sdk//25.08 \
            -c '
              echo "============================================================"
              echo "SDL"
              echo "============================================================"

              for pkg in \
                sdl2 \
                SDL2_image \
                SDL2_ttf \
                SDL2_mixer
              do
                printf "%-24s " "$pkg"

                if pkg-config --exists "$pkg"; then
                  pkg-config --modversion "$pkg"
                else
                  echo "NOT FOUND"
                fi
              done

              echo
              echo "============================================================"
              echo "GSTREAMER"
              echo "============================================================"

              for pkg in \
                gstreamer-1.0 \
                gstreamer-app-1.0 \
                gstreamer-video-1.0
              do
                printf "%-24s " "$pkg"

                if pkg-config --exists "$pkg"; then
                  pkg-config --modversion "$pkg"
                else
                  echo "NOT FOUND"
                fi
              done

              echo
              echo "============================================================"
              echo "OTHER DEPENDENCIES"
              echo "============================================================"

              for pkg in \
                fontconfig \
                libcurl \
                libusb-1.0 \
                libevdev \
                libudev \
                zlib \
                libwebp \
                minizip \
                libserialport
              do
                printf "%-24s " "$pkg"

                if pkg-config --exists "$pkg"; then
                  pkg-config --modversion "$pkg"
                else
                  echo "NOT FOUND"
                fi
              done
            '

      # ============================================================
      # Create launcher + desktop metadata
      # ============================================================

      - name: Create Flatpak metadata
        run: |
          mkdir -p Packaging/Flatpak

          cat > Packaging/Flatpak/coinops-launcher <<'EOF'
          #!/bin/sh
          set -eu

          if [ "$#" -lt 1 ]; then
              echo "Usage:"
              echo "  flatpak run org.coinops.Runtime <CoinOPS build folder>"
              echo
              echo "Example:"
              echo '  flatpak run org.coinops.Runtime "$HOME/CoinOPS Arise"'
              exit 1
          fi

          COINOPS_ROOT="$1"
          shift

          if [ ! -d "$COINOPS_ROOT" ]; then
              echo "CoinOPS build folder not found:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          if [ ! -f "$COINOPS_ROOT/settings.conf" ]; then
              echo "settings.conf not found in CoinOPS build folder:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          export RETROFE_PATH="$COINOPS_ROOT"

          cd "$COINOPS_ROOT"

          exec /app/bin/retrofe "$@"
          EOF

          chmod +x Packaging/Flatpak/coinops-launcher

          cat > Packaging/Flatpak/coinops-runtime.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=CoinOPS Runtime
          Comment=CoinOPS Runtime
          Exec=coinops-launcher
          Icon=org.coinops.Runtime
          Terminal=false
          Categories=Game;
          EOF

          cp \
            Package/Environment/Common/RetroFE.png \
            Packaging/Flatpak/coinops-runtime.png

      # ============================================================
      # Create native Flatpak manifest
      # ============================================================

      - name: Create native Flatpak manifest
        run: |
          cat > org.coinops.Runtime.yml <<'EOF'
          app-id: org.coinops.Runtime

          runtime: org.freedesktop.Platform
          runtime-version: '25.08'
          sdk: org.freedesktop.Sdk

          command: coinops-launcher

          finish-args:
            - --share=ipc
            - --share=network

            - --socket=wayland
            - --socket=fallback-x11
            - --socket=pulseaudio

            - --device=all

            - --filesystem=home
            - --filesystem=/run/media
            - --filesystem=/media
            - --filesystem=/mnt

          modules:

            # ======================================================
            # SDL2_image
            #
            # Missing from Freedesktop 25.08.
            # ======================================================

            - name: SDL2_image
              buildsystem: cmake-ninja
              builddir: true

              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DCMAKE_INSTALL_PREFIX=/app
                - -DBUILD_SHARED_LIBS=ON
                - -DSDL2IMAGE_SAMPLES=OFF
                - -DSDL2IMAGE_TESTS=OFF

              cleanup:
                - /include
                - /lib/cmake
                - /lib/pkgconfig
                - '*.a'
                - '*.la'

              sources:
                - type: git
                  url: https://github.com/libsdl-org/SDL_image.git
                  branch: SDL2

            # ======================================================
            # SDL2_ttf
            #
            # Missing from Freedesktop 25.08.
            # ======================================================

            - name: SDL2_ttf
              buildsystem: cmake-ninja
              builddir: true

              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DCMAKE_INSTALL_PREFIX=/app
                - -DBUILD_SHARED_LIBS=ON
                - -DSDL2TTF_SAMPLES=OFF

              cleanup:
                - /include
                - /lib/cmake
                - /lib/pkgconfig
                - '*.a'
                - '*.la'

              sources:
                - type: git
                  url: https://github.com/libsdl-org/SDL_ttf.git
                  branch: SDL2

            # ======================================================
            # libevdev
            #
            # Missing from Freedesktop 25.08.
            # RetroFE uses it for Linux input handling.
            # ======================================================

            - name: libevdev
              buildsystem: meson

              config-opts:
                - -Dtests=disabled
                - -Ddocumentation=disabled

              cleanup:
                - /include
                - /lib/pkgconfig
                - '*.a'
                - '*.la'

              sources:
                - type: git
                  url: https://gitlab.freedesktop.org/libevdev/libevdev.git
                  branch: master

            # ======================================================
            # libserialport
            #
            # Required by RetroFE restrictor / hardware integration.
            # ======================================================

            - name: libserialport
              buildsystem: autotools

              config-opts:
                - --disable-static
                - --enable-shared

              cleanup:
                - /include
                - /lib/pkgconfig
                - '*.a'
                - '*.la'

              sources:
                - type: git
                  url: https://github.com/martinling/libserialport.git
                  branch: master

            # ======================================================
            # Classic Minizip
            #
            # Required by:
            #
            #   ThirdParty/openhi2txt
            #
            # Provides classic API:
            #
            #   unzip.h
            #   zip.h
            #   unzOpen()
            #   unzGoToFirstFile()
            #
            # Built from zlib 1.3.1 contrib/minizip.
            # ======================================================

            - name: minizip
              buildsystem: simple
              subdir: contrib/minizip

              build-commands:
                - |
                  cc \
                    -fPIC \
                    -O2 \
                    -I. \
                    -c ioapi.c \
                    -o ioapi.o

                - |
                  cc \
                    -fPIC \
                    -O2 \
                    -I. \
                    -c unzip.c \
                    -o unzip.o

                - |
                  cc \
                    -fPIC \
                    -O2 \
                    -I. \
                    -c zip.c \
                    -o zip.o

                - |
                  cc \
                    -shared \
                    -Wl,-soname,libminizip.so.1 \
                    -o libminizip.so.1.0.0 \
                    ioapi.o \
                    unzip.o \
                    zip.o \
                    -lz

                - ln -s libminizip.so.1.0.0 libminizip.so.1

                - ln -s libminizip.so.1 libminizip.so

                - install -Dm755 libminizip.so.1.0.0 /app/lib/libminizip.so.1.0.0

                - ln -s libminizip.so.1.0.0 /app/lib/libminizip.so.1

                - ln -s libminizip.so.1 /app/lib/libminizip.so

                - install -Dm644 unzip.h /app/include/minizip/unzip.h

                - install -Dm644 zip.h /app/include/minizip/zip.h

                - install -Dm644 ioapi.h /app/include/minizip/ioapi.h

              sources:
                - type: git
                  url: https://github.com/madler/zlib.git
                  tag: v1.3.1

            # ======================================================
            # RetroFE
            #
            # Built inside org.freedesktop.Sdk//25.08.
            #
            # Runtime-provided:
            #
            #   sdl2
            #   SDL2_mixer
            #   GStreamer
            #   fontconfig
            #   curl
            #   libusb
            #   libudev
            #   zlib
            #   libwebp
            #
            # Bundled above:
            #
            #   SDL2_image
            #   SDL2_ttf
            #   libevdev
            #   libserialport
            #   minizip
            # ======================================================

            - name: retrofe
              buildsystem: simple

              build-commands:
                - |
                  echo "============================================================"
                  echo "Checking required RetroFE dependencies"
                  echo "============================================================"

                  check_pkg() {
                    PKG="$1"

                    if pkg-config --exists "$PKG"; then
                      VERSION="$(pkg-config --modversion "$PKG")"
                      echo "[FOUND] $PKG $VERSION"
                    else
                      echo "[MISSING] $PKG"
                      exit 1
                    fi
                  }

                  echo
                  echo "--- SDL ---"

                  check_pkg sdl2
                  check_pkg SDL2_image
                  check_pkg SDL2_ttf
                  check_pkg SDL2_mixer

                  echo
                  echo "--- GStreamer ---"

                  check_pkg gstreamer-1.0
                  check_pkg gstreamer-app-1.0
                  check_pkg gstreamer-video-1.0

                  echo
                  echo "--- Other dependencies ---"

                  check_pkg fontconfig
                  check_pkg libcurl
                  check_pkg libusb-1.0
                  check_pkg libevdev
                  check_pkg libudev
                  check_pkg zlib
                  check_pkg libwebp
                  check_pkg libserialport

                  echo
                  echo "--- Minizip ---"

                  if [ -f /app/include/minizip/unzip.h ] && \
                     [ -f /app/lib/libminizip.so ]; then
                    echo "[FOUND] classic minizip"
                  else
                    echo "[MISSING] classic minizip"
                    exit 1
                  fi

                  echo
                  echo "--- Module source layout ---"

                  pwd

                  find . \
                    -maxdepth 2 \
                    -type d \
                    | sort \
                    | head -100

                - |
                  echo
                  echo "============================================================"
                  echo "Configuring RetroFE"
                  echo "============================================================"

                  cmake \
                    -S Source \
                    -B Build \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_PREFIX_PATH=/app \
                    -DCMAKE_INSTALL_PREFIX=/app \
                    -DMINIZIP_INCLUDE_DIR=/app/include/minizip \
                    -DMINIZIP_LIBRARY=/app/lib/libminizip.so

                - |
                  echo
                  echo "============================================================"
                  echo "Building RetroFE"
                  echo "============================================================"

                  cmake \
                    --build Build \
                    --parallel

                - test -x Build/retrofe

                - install -Dm755 Build/retrofe /app/bin/retrofe

              sources:
                - type: dir
                  path: RetroFE

            # ======================================================
            # Custom MAME
            #
            # Built inside the same Freedesktop SDK environment.
            # ======================================================

            - name: mame
              buildsystem: simple

              build-options:
                env:
                  MAKEFLAGS: -j3

              build-commands:
                - |
                  echo "============================================================"
                  echo "Building custom MAME inside Freedesktop SDK"
                  echo "============================================================"

                  make \
                    -j3 \
                    REGENIE=1 \
                    USE_FFMPEG=0 \
                    TOOLS=0 \
                    TESTS=0 \
                    BENCHMARKS=0 \
                    USE_QTDEBUG=0 \
                    NO_USE_MIDI=1 \
                    NO_USE_PORTAUDIO=1 \
                    USE_TAPTUN=0 \
                    USE_PCAP=0

                - test -x mame

                - install -Dm755 mame /app/bin/mame

              sources:
                - type: dir
                  path: MAME

            # ======================================================
            # CoinOPS launcher + desktop metadata
            # ======================================================

            - name: coinops-runtime
              buildsystem: simple

              build-commands:
                - install -Dm755 coinops-launcher /app/bin/coinops-launcher

                - install -Dm644 coinops-runtime.desktop /app/share/applications/org.coinops.Runtime.desktop

                - install -Dm644 coinops-runtime.png /app/share/icons/hicolor/256x256/apps/org.coinops.Runtime.png

              sources:
                - type: file
                  path: Packaging/Flatpak/coinops-launcher

                - type: file
                  path: Packaging/Flatpak/coinops-runtime.desktop

                - type: file
                  path: Packaging/Flatpak/coinops-runtime.png
          EOF

          cat org.coinops.Runtime.yml

      # ============================================================
      # Cache flatpak-builder state
      #
      # Unchanged modules should be reused between runs.
      # ============================================================

      - name: Cache Flatpak builder
        uses: actions/cache@v4
        with:
          path: .flatpak-builder
          key: coinops-native-flatpak-${{ runner.os }}-25.08-${{ github.sha }}
          restore-keys: |
            coinops-native-flatpak-${{ runner.os }}-25.08-

      # ============================================================
      # Build native Flatpak
      # ============================================================

      - name: Build native CoinOPS Flatpak
        run: |
          rm -rf build-dir repo

          flatpak-builder \
            --user \
            --force-clean \
            --repo=repo \
            --install-deps-from=flathub \
            build-dir \
            org.coinops.Runtime.yml

      # ============================================================
      # Analyze resulting Flatpak
      # ============================================================

      - name: Analyze native Flatpak
        run: |
          echo "============================================================"
          echo "TOTAL /APP PAYLOAD"
          echo "============================================================"

          du -sh build-dir/files

          echo
          echo "============================================================"
          echo "/APP/BIN"
          echo "============================================================"

          ls -lh build-dir/files/bin

          echo
          echo "============================================================"
          echo "RETROFE"
          echo "============================================================"

          file build-dir/files/bin/retrofe
          ldd build-dir/files/bin/retrofe || true

          echo
          echo "============================================================"
          echo "MAME"
          echo "============================================================"

          file build-dir/files/bin/mame
          ldd build-dir/files/bin/mame || true

          echo
          echo "============================================================"
          echo "BUNDLED /APP/LIB"
          echo "============================================================"

          if [ -d build-dir/files/lib ]; then
            find build-dir/files/lib \
              -maxdepth 3 \
              \( -type f -o -type l \) \
              -printf '%p\n' \
              | sort

            echo

            du -h -d 3 build-dir/files/lib 2>/dev/null \
              | sort -h \
              | tail -100
          fi

          echo
          echo "============================================================"
          echo "50 LARGEST FILES IN /APP"
          echo "============================================================"

          find build-dir/files \
            -type f \
            -printf '%s %p\n' \
            | sort -nr \
            | head -50 \
            | numfmt --field=1 --to=iec || true

          echo
          echo "============================================================"
          echo "REPOSITORY SIZE"
          echo "============================================================"

          du -sh repo

      # ============================================================
      # Smoke tests inside built Flatpak environment
      # ============================================================

      - name: Smoke test native Flatpak
        run: |
          echo "============================================================"
          echo "RetroFE version"
          echo "============================================================"

          flatpak-builder \
            --run \
            build-dir \
            org.coinops.Runtime.yml \
            /app/bin/retrofe \
            --version || true

          echo
          echo "============================================================"
          echo "MAME version"
          echo "============================================================"

          flatpak-builder \
            --run \
            build-dir \
            org.coinops.Runtime.yml \
            /app/bin/mame \
            -version

          echo
          echo "============================================================"
          echo "PATH resolution"
          echo "============================================================"

          flatpak-builder \
            --run \
            build-dir \
            org.coinops.Runtime.yml \
            sh \
            -c '
              echo "$PATH"

              echo
              echo "retrofe:"
              command -v retrofe

              echo
              echo "mame:"
              command -v mame

              echo
              echo "coinops-launcher:"
              command -v coinops-launcher
            '

      # ============================================================
      # Build distributable Flatpak bundle
      # ============================================================

      - name: Build Flatpak bundle
        run: |
          echo "Creating native Flatpak bundle..."

          (
            while true; do
              echo "Still building Flatpak bundle: $(date)"
              sleep 60
            done
          ) &

          HEARTBEAT_PID=$!

          trap 'kill "$HEARTBEAT_PID" 2>/dev/null || true' EXIT

          flatpak build-bundle \
            repo \
            CoinOPS-Runtime-Native-x86_64.flatpak \
            org.coinops.Runtime \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo

          kill "$HEARTBEAT_PID" 2>/dev/null || true
          trap - EXIT

          echo
          echo "Bundle complete:"
          ls -lh CoinOPS-Runtime-Native-x86_64.flatpak

          echo
          echo "Bundle byte size:"
          stat --printf='%s bytes\n' CoinOPS-Runtime-Native-x86_64.flatpak

      # ============================================================
      # Upload artifact
      # ============================================================

      - name: Upload native CoinOPS Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: CoinOPS-Runtime-Native-x86_64.flatpak
          path: CoinOPS-Runtime-Native-x86_64.flatpak
          if-no-files-found: error
