name: CoinOPS Native Flatpak - Self Hosted

on:
  workflow_dispatch:

jobs:
  build:
    runs-on:
      - self-hosted
      - linux
      - x64

    name: Build Native CoinOPS Flatpak x86_64

    steps:
      # ============================================================
      # Checkout RetroFE
      #
      # clean: false preserves persistent self-hosted build state,
      # especially .flatpak-builder, between workflow runs.
      # ============================================================

      - name: Checkout RetroFE
        uses: actions/checkout@v6
        with:
          clean: false

      # ============================================================
      # Checkout custom MAME fork
      # ============================================================

      - name: Checkout MAME fork
        uses: actions/checkout@v6
        with:
          repository: CoinOPS-Official/MAME-FFMpeg
          ref: mame0285-local
          path: MAME
          token: ${{ secrets.MAME_REPO_TOKEN }}
          clean: true
          fetch-depth: 1

      # ============================================================
      # Show exact source revisions
      # ============================================================

      - name: Show source revisions
        run: |
          echo "============================================================"
          echo "RetroFE revision"
          echo "============================================================"
          git rev-parse HEAD

          echo
          echo "============================================================"
          echo "MAME revision"
          echo "============================================================"
          git -C MAME rev-parse HEAD

      # ============================================================
      # Verify host build tools
      #
      # Install once on self-hosted Arch/CachyOS:
      #
      # sudo pacman -S --needed flatpak flatpak-builder git
      # ============================================================

      - name: Verify host build tools
        run: |
          set -e

          echo "============================================================"
          echo "HOST"
          echo "============================================================"

          uname -a

          echo
          echo "CPU:"
          lscpu | grep -E \
            'Model name|Socket|Core\(s\)|Thread\(s\)|CPU\(s\)' \
            || true

          echo
          echo "Available logical CPUs:"
          nproc

          echo
          echo "Memory:"
          free -h

          echo
          echo "Disk:"
          df -h .

          echo
          echo "============================================================"
          echo "TOOLS"
          echo "============================================================"

          git --version
          flatpak --version
          flatpak-builder --version

      # ============================================================
      # Configure Flathub
      # ============================================================

      - name: Configure Flathub
        run: |
          flatpak remote-add \
            --user \
            --if-not-exists \
            flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      # ============================================================
      # Install matching Freedesktop runtime + SDK
      # ============================================================

      - name: Install Freedesktop 25.08 runtime and SDK
        run: |
          flatpak install \
            --user \
            --noninteractive \
            flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08

      # ============================================================
      # Inspect SDK dependency availability
      # ============================================================

      - name: Inspect Freedesktop SDK dependencies
        run: |
          flatpak run \
            --command=sh \
            org.freedesktop.Sdk//25.08 \
            -c '
              echo "============================================================"
              echo "SDL"
              echo "============================================================"

              for pkg in \
                sdl2 \
                SDL2_image \
                SDL2_ttf \
                SDL2_mixer
              do
                printf "%-24s " "$pkg"

                if pkg-config --exists "$pkg"; then
                  pkg-config --modversion "$pkg"
                else
                  echo "NOT FOUND"
                fi
              done

              echo
              echo "============================================================"
              echo "GSTREAMER"
              echo "============================================================"

              for pkg in \
                gstreamer-1.0 \
                gstreamer-app-1.0 \
                gstreamer-video-1.0
              do
                printf "%-24s " "$pkg"

                if pkg-config --exists "$pkg"; then
                  pkg-config --modversion "$pkg"
                else
                  echo "NOT FOUND"
                fi
              done

              echo
              echo "============================================================"
              echo "OTHER DEPENDENCIES"
              echo "============================================================"

              for pkg in \
                fontconfig \
                libcurl \
                libusb-1.0 \
                libevdev \
                libudev \
                zlib \
                libwebp \
                minizip \
                libserialport
              do
                printf "%-24s " "$pkg"

                if pkg-config --exists "$pkg"; then
                  pkg-config --modversion "$pkg"
                else
                  echo "NOT FOUND"
                fi
              done

              echo
              echo "============================================================"
              echo "CCACHE"
              echo "============================================================"

              if command -v ccache >/dev/null 2>&1; then
                echo "ccache found:"
                command -v ccache
                ccache --version | head -1
              else
                echo "ERROR: ccache not found in Freedesktop SDK"
                exit 1
              fi
            '

      # ============================================================
      # Create launcher + desktop metadata
      # ============================================================

      - name: Create Flatpak metadata
        run: |
          mkdir -p Packaging/Flatpak

          cat > Packaging/Flatpak/coinops-launcher <<'EOF'
          #!/bin/sh
          set -eu

          if [ "$#" -lt 1 ]; then
              echo "Usage:"
              echo "  flatpak run org.coinops.Runtime <CoinOPS build folder>"
              echo
              echo "Example:"
              echo '  flatpak run org.coinops.Runtime "$HOME/CoinOPS Arise"'
              exit 1
          fi

          COINOPS_ROOT="$1"
          shift

          if [ ! -d "$COINOPS_ROOT" ]; then
              echo "CoinOPS build folder not found:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          if [ ! -f "$COINOPS_ROOT/settings.conf" ]; then
              echo "settings.conf not found in CoinOPS build folder:"
              echo "  $COINOPS_ROOT"
              exit 1
          fi

          export RETROFE_PATH="$COINOPS_ROOT"

          cd "$COINOPS_ROOT"

          exec /app/bin/retrofe "$@"
          EOF

          chmod +x Packaging/Flatpak/coinops-launcher

          cat > Packaging/Flatpak/coinops-runtime.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=CoinOPS Runtime
          Comment=CoinOPS Runtime
          Exec=coinops-launcher
          Icon=org.coinops.Runtime
          Terminal=false
          Categories=Game;
          EOF

          cp \
            Package/Environment/Common/RetroFE.png \
            Packaging/Flatpak/coinops-runtime.png

      # ============================================================
      # Create native Flatpak manifest
      #
      # Module order is deliberate:
      #
      #   SDL2_ttf
      #   MAME
      #   SDL2_image
      #   libevdev
      #   libserialport
      #   minizip
      #   RetroFE
      #   runtime-cleanup
      #   launcher metadata
      #
      # SDL2_ttf must precede MAME because MAME requires it.
      #
      # SDL2_image and other RetroFE-only dependencies remain after
      # MAME so changes to them do not invalidate the MAME module.
      # ============================================================

      - name: Create native Flatpak manifest
        run: |
          cat > org.coinops.Runtime.yml <<'EOF'
          app-id: org.coinops.Runtime

          runtime: org.freedesktop.Platform
          runtime-version: '25.08'
          sdk: org.freedesktop.Sdk

          command: coinops-launcher

          finish-args:
            - --share=ipc
            - --share=network

            - --socket=wayland
            - --socket=fallback-x11
            - --socket=pulseaudio

            - --device=all

            - --filesystem=home
            - --filesystem=/run/media
            - --filesystem=/media
            - --filesystem=/mnt

          modules:

            # ======================================================
            # SDL2_ttf
            #
            # Required by MAME and RetroFE.
            # ======================================================

            - name: SDL2_ttf
              buildsystem: cmake-ninja
              builddir: true

              build-options:
                strip: true
                no-debuginfo: true

              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DCMAKE_INSTALL_PREFIX=/app
                - -DBUILD_SHARED_LIBS=ON
                - -DSDL2TTF_SAMPLES=OFF

              cleanup:
                - /include
                - /lib/cmake
                - /lib/pkgconfig
                - '*.a'
                - '*.la'

              sources:
                - type: git
                  url: https://github.com/libsdl-org/SDL_ttf.git
                  branch: SDL2

            # ======================================================
            # Custom MAME
            #
            # MAME depends on SDL2_ttf, so it comes immediately after
            # SDL2_ttf and before RetroFE-only dependencies.
            #
            # Host:
            #   6 physical cores
            #   12 logical CPUs
            #
            # Use 10 jobs to leave some headroom.
            #
            # Debug info is explicitly disabled because previous full
            # links overflowed 32-bit DWARF relocations.
            # ======================================================

            - name: mame
              buildsystem: simple

              build-options:
                strip: true
                no-debuginfo: true

                cflags-override: true
                cxxflags-override: true

                cflags: -O2 -g0
                cxxflags: -O2 -g0

              build-commands:
                - |
                  echo "============================================================"
                  echo "MAME build environment"
                  echo "============================================================"

                  echo "Compiler:"
                  c++ --version

                  echo
                  echo "Available logical CPUs:"
                  nproc

                  echo
                  echo "Configured MAME parallel jobs:"
                  echo "10"

                  echo
                  echo "Environment flags:"
                  echo "CFLAGS=${CFLAGS:-}"
                  echo "CXXFLAGS=${CXXFLAGS:-}"
                  echo "LDFLAGS=${LDFLAGS:-}"

                  echo
                  echo "============================================================"
                  echo "Building custom MAME inside Freedesktop SDK"
                  echo "============================================================"

                  MAME_JOBS=10

                  # SOURCEFILTER can change which translation units belong to each
                  # subtarget library. Remove only the generated CoinOPS archives so
                  # stale library membership cannot survive an incremental build.
                  #
                  # Object files and ccache are preserved, so this is cheap compared
                  # with a clean MAME rebuild.
                  echo "Removing stale CoinOPS static archives..."

                  find build \
                    -type f \
                    -path '*/mame_coinops/*.a' \
                    -print \
                    -delete \
                    2>/dev/null \
                    || true

                  echo
                  echo "Building MAME with ${MAME_JOBS} parallel jobs"

                  set -o pipefail

                  if ! make \
                    -j"${MAME_JOBS}" \
                    SUBTARGET=coinops \
                    SOURCEFILTER=src/mame/coinops.flt \
                    REGENIE=1 \
                    SYMBOLS=0 \
                    SYMLEVEL=0 \
                    ARCHOPTS="-g0" \
                    USE_FFMPEG=0 \
                    TOOLS=0 \
                    TESTS=0 \
                    BENCHMARKS=0 \
                    USE_QTDEBUG=0 \
                    NO_USE_MIDI=1 \
                    NO_USE_PORTAUDIO=1 \
                    USE_TAPTUN=0 \
                    USE_PCAP=0 \
                    2>&1 \
                    | tee mame-build.log \
                    | awk '
                        /Compiling/ || /Archiving/ || /Compressing/ || /Generating/ {
                          progress++

                          if (progress == 1 || progress % 100 == 0) {
                            printf "[MAME] %d build steps completed... %s\\n", progress, $0
                            fflush()
                          }

                          next
                        }

                        {
                          print
                          fflush()
                        }
                      '
                  then
                    echo
                    echo "============================================================"
                    echo "MAME BUILD FAILED - LAST 200 LOG LINES"
                    echo "============================================================"

                    tail -200 mame-build.log || true
                    exit 1
                  fi

                  test -x coinops

                  echo
                  echo "============================================================"
                  echo "Built CoinOPS MAME subtarget"
                  echo "============================================================"

                  ./coinops -version
                  ls -lh coinops
                  du -h coinops

                  # Install under the standard runtime name expected by RetroFE.
                  install -Dm755 coinops /app/bin/mame

              sources:
                - type: git
                  path: MAME
                  branch: mame0285-local

            # ======================================================
            # SDL2_image
            #
            # Load:
            #   PNG
            #   JPG/JPEG
            #   QOI
            #   WebP
            #   GIF
            #
            # Save:
            #   PNG only
            #
            # PNG_SAVE is required by RetroFE IMG_SavePNG() for
            # generated QR codes.
            # ======================================================

            - name: SDL2_image
              buildsystem: cmake-ninja
              builddir: true

              build-options:
                strip: true
                no-debuginfo: true

              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DCMAKE_INSTALL_PREFIX=/app
                - -DBUILD_SHARED_LIBS=ON

                - -DSDL2IMAGE_SAMPLES=OFF
                - -DSDL2IMAGE_TESTS=OFF

                # Formats RetroFE uses.
                - -DSDL2IMAGE_PNG=ON
                - -DSDL2IMAGE_JPG=ON
                - -DSDL2IMAGE_QOI=ON
                - -DSDL2IMAGE_WEBP=ON
                - -DSDL2IMAGE_GIF=ON

                # PNG writing required for generated QR codes.
                - -DSDL2IMAGE_PNG_SAVE=ON

                # JPEG writing not required.
                - -DSDL2IMAGE_JPG_SAVE=OFF

                # Disable unused formats.
                - -DSDL2IMAGE_AVIF=OFF
                - -DSDL2IMAGE_BMP=OFF
                - -DSDL2IMAGE_JXL=OFF
                - -DSDL2IMAGE_LBM=OFF
                - -DSDL2IMAGE_PCX=OFF
                - -DSDL2IMAGE_PNM=OFF
                - -DSDL2IMAGE_SVG=OFF
                - -DSDL2IMAGE_TGA=OFF
                - -DSDL2IMAGE_TIF=OFF
                - -DSDL2IMAGE_XCF=OFF
                - -DSDL2IMAGE_XPM=OFF
                - -DSDL2IMAGE_XV=OFF

              cleanup:
                - /include
                - /lib/cmake
                - /lib/pkgconfig
                - '*.a'
                - '*.la'

              sources:
                - type: git
                  url: https://github.com/libsdl-org/SDL_image.git
                  branch: SDL2

            # ======================================================
            # libevdev
            # ======================================================

            - name: libevdev
              buildsystem: meson

              build-options:
                strip: true
                no-debuginfo: true

              config-opts:
                - -Dtests=disabled
                - -Ddocumentation=disabled

              cleanup:
                - /bin/libevdev-tweak-device
                - /bin/mouse-dpi-tool
                - /bin/touchpad-edge-detector

                - /include
                - /lib/pkgconfig

                - '*.a'
                - '*.la'

              sources:
                - type: git
                  url: https://gitlab.freedesktop.org/libevdev/libevdev.git
                  branch: master

            # ======================================================
            # libserialport
            # ======================================================

            - name: libserialport
              buildsystem: autotools

              build-options:
                strip: true
                no-debuginfo: true

              config-opts:
                - --disable-static
                - --enable-shared

              cleanup:
                - /include
                - /lib/pkgconfig
                - '*.a'
                - '*.la'

              sources:
                - type: git
                  url: https://github.com/martinling/libserialport.git
                  branch: master

            # ======================================================
            # Classic Minizip
            #
            # Required by ThirdParty/openhi2txt.
            #
            # Headers are temporarily installed into /app/include so
            # RetroFE can compile against them.
            #
            # The final runtime-cleanup module removes the headers
            # after RetroFE has finished building.
            # ======================================================

            - name: minizip
              buildsystem: simple
              subdir: contrib/minizip

              build-options:
                strip: true
                no-debuginfo: true

              build-commands:
                - |
                  cc \
                    -fPIC \
                    -O2 \
                    -I. \
                    -c ioapi.c \
                    -o ioapi.o

                - |
                  cc \
                    -fPIC \
                    -O2 \
                    -I. \
                    -c unzip.c \
                    -o unzip.o

                - |
                  cc \
                    -fPIC \
                    -O2 \
                    -I. \
                    -c zip.c \
                    -o zip.o

                - |
                  cc \
                    -shared \
                    -Wl,-soname,libminizip.so.1 \
                    -o libminizip.so.1.0.0 \
                    ioapi.o \
                    unzip.o \
                    zip.o \
                    -lz

                - ln -sf libminizip.so.1.0.0 libminizip.so.1
                - ln -sf libminizip.so.1 libminizip.so

                - install -Dm755 libminizip.so.1.0.0 /app/lib/libminizip.so.1.0.0
                - ln -sf libminizip.so.1.0.0 /app/lib/libminizip.so.1
                - ln -sf libminizip.so.1 /app/lib/libminizip.so

                - install -Dm644 unzip.h /app/include/minizip/unzip.h
                - install -Dm644 zip.h /app/include/minizip/zip.h
                - install -Dm644 ioapi.h /app/include/minizip/ioapi.h

              sources:
                - type: git
                  url: https://github.com/madler/zlib.git
                  tag: v1.3.1

            # ======================================================
            # RetroFE
            #
            # Flatpak-builder copies the CONTENTS of the RetroFE
            # directory into the module build root.
            # ======================================================

            - name: retrofe
              buildsystem: simple

              build-options:
                strip: true
                no-debuginfo: true

              build-commands:
                - |
                  echo "============================================================"
                  echo "Checking required RetroFE dependencies"
                  echo "============================================================"

                  check_pkg() {
                    PKG="$1"

                    if pkg-config --exists "$PKG"; then
                      VERSION="$(pkg-config --modversion "$PKG")"
                      echo "[FOUND] $PKG $VERSION"
                    else
                      echo "[MISSING] $PKG"
                      exit 1
                    fi
                  }

                  echo
                  echo "--- SDL ---"

                  check_pkg sdl2
                  check_pkg SDL2_image
                  check_pkg SDL2_ttf
                  check_pkg SDL2_mixer

                  echo
                  echo "--- GStreamer ---"

                  check_pkg gstreamer-1.0
                  check_pkg gstreamer-app-1.0
                  check_pkg gstreamer-video-1.0

                  echo
                  echo "--- Other dependencies ---"

                  check_pkg fontconfig
                  check_pkg libcurl
                  check_pkg libusb-1.0
                  check_pkg libevdev
                  check_pkg libudev
                  check_pkg zlib
                  check_pkg libwebp
                  check_pkg libserialport

                  echo
                  echo "--- Minizip ---"

                  if [ -f /app/include/minizip/unzip.h ] && \
                     [ -f /app/lib/libminizip.so ]; then
                    echo "[FOUND] classic minizip"
                  else
                    echo "[MISSING] classic minizip"
                    exit 1
                  fi

                - |
                  echo
                  echo "============================================================"
                  echo "Configuring RetroFE"
                  echo "============================================================"

                  cmake \
                    -S Source \
                    -B Build \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_PREFIX_PATH=/app \
                    -DCMAKE_INSTALL_PREFIX=/app \
                    -DMINIZIP_INCLUDE_DIR=/app/include/minizip \
                    -DMINIZIP_LIBRARY=/app/lib/libminizip.so

                - |
                  echo
                  echo "============================================================"
                  echo "Building RetroFE"
                  echo "============================================================"

                  cmake \
                    --build Build \
                    --parallel 10

                - test -x Build/retrofe

                - install -Dm755 Build/retrofe /app/bin/retrofe

              sources:
                - type: dir
                  path: RetroFE

            # ======================================================
            # Final runtime cleanup
            #
            # At this point MAME and RetroFE are fully built.
            #
            # Remove development/debug/build-only files that are not
            # required by the installed runtime.
            # ======================================================

            - name: runtime-cleanup
              buildsystem: simple

              build-commands:
                - |
                  echo "============================================================"
                  echo "Cleaning final runtime payload"
                  echo "============================================================"

                # Development headers.
                - rm -rf /app/include

                # Debug symbols and copied source trees.
                - rm -rf /app/lib/debug

                # Build-system metadata.
                - rm -rf /app/lib/cmake
                - rm -rf /app/lib/pkgconfig

                # Documentation/man pages from helper utilities.
                - rm -rf /app/share/man

                # Static and libtool archives.
                - |
                  find /app \
                    -type f \
                    \( -name '*.a' -o -name '*.la' \) \
                    -delete

                # Remove unversioned linker-only .so symlinks.
                #
                # Keep runtime SONAME links such as:
                #
                #   libfoo.so.0
                #   libfoo.so.1
                #
                # Executables load those at runtime.
                - |
                  find /app/lib \
                    -maxdepth 1 \
                    -type l \
                    -name '*.so' \
                    -delete

                - |
                  echo
                  echo "============================================================"
                  echo "Remaining /app/lib contents"
                  echo "============================================================"

                  find /app/lib \
                    -maxdepth 2 \
                    \( -type f -o -type l \) \
                    -print \
                    | sort \
                    || true

            # ======================================================
            # CoinOPS launcher + desktop metadata
            # ======================================================

            - name: coinops-runtime
              buildsystem: simple

              build-commands:
                - install -Dm755 coinops-launcher /app/bin/coinops-launcher
                - install -Dm644 coinops-runtime.desktop /app/share/applications/org.coinops.Runtime.desktop
                - install -Dm644 coinops-runtime.png /app/share/icons/hicolor/256x256/apps/org.coinops.Runtime.png

              sources:
                - type: file
                  path: Packaging/Flatpak/coinops-launcher

                - type: file
                  path: Packaging/Flatpak/coinops-runtime.desktop

                - type: file
                  path: Packaging/Flatpak/coinops-runtime.png
          EOF

          cat org.coinops.Runtime.yml

      # ============================================================
      # Inspect persistent local builder state
      #
      # No actions/cache step is needed on the normal self-hosted
      # runner because .flatpak-builder remains on local storage.
      # ============================================================

      - name: Inspect persistent build cache
        run: |
          echo "============================================================"
          echo "PERSISTENT FLATPAK-BUILDER STATE"
          echo "============================================================"

          if [ -d .flatpak-builder ]; then
            du -sh .flatpak-builder || true

            echo
            echo "Top-level cache contents:"

            du \
              -h \
              --max-depth=1 \
              .flatpak-builder \
              2>/dev/null \
              | sort -h \
              || true
          else
            echo "No existing .flatpak-builder cache."
            echo "This appears to be the first local build."
          fi

      # ============================================================
      # Build native Flatpak
      #
      # build-dir and repo are disposable.
      #
      # .flatpak-builder is deliberately preserved.
      # ============================================================

      - name: Build native CoinOPS Flatpak
        run: |
          rm -rf build-dir repo

          echo "============================================================"
          echo "Starting native Flatpak build"
          echo "============================================================"

          flatpak-builder \
            --user \
            --force-clean \
            --ccache \
            --repo=repo \
            --install-deps-from=flathub \
            build-dir \
            org.coinops.Runtime.yml

      # ============================================================
      # Analyze resulting Flatpak
      # ============================================================

      - name: Analyze native Flatpak
        run: |
          echo "============================================================"
          echo "TOTAL /APP PAYLOAD"
          echo "============================================================"

          du -sh build-dir/files

          echo
          echo "============================================================"
          echo "/APP/BIN"
          echo "============================================================"

          ls -lh build-dir/files/bin

          echo
          echo "============================================================"
          echo "RETROFE"
          echo "============================================================"

          file build-dir/files/bin/retrofe

          echo
          echo "Dynamic dependencies:"
          ldd build-dir/files/bin/retrofe || true

          echo
          echo "============================================================"
          echo "MAME"
          echo "============================================================"

          file build-dir/files/bin/mame

          echo
          echo "Dynamic dependencies:"
          ldd build-dir/files/bin/mame || true

          echo
          echo "============================================================"
          echo "BUNDLED /APP/LIB"
          echo "============================================================"

          if [ -d build-dir/files/lib ]; then
            find build-dir/files/lib \
              -maxdepth 3 \
              \( -type f -o -type l \) \
              -printf '%p\n' \
              | sort

            echo

            du \
              -h \
              -d 3 \
              build-dir/files/lib \
              2>/dev/null \
              | sort -h \
              | tail -100
          fi

          echo
          echo "============================================================"
          echo "BUILD-ONLY FILE CHECK"
          echo "============================================================"

          for path in \
            build-dir/files/include \
            build-dir/files/lib/debug \
            build-dir/files/lib/cmake \
            build-dir/files/lib/pkgconfig \
            build-dir/files/share/man
          do
            if [ -e "$path" ]; then
              echo "[LEFTOVER] $path"
            else
              echo "[CLEAN] $path"
            fi
          done

          echo
          echo "============================================================"
          echo "50 LARGEST FILES IN /APP"
          echo "============================================================"

          find build-dir/files \
            -type f \
            -printf '%s %p\n' \
            | sort -nr \
            | head -50 \
            | numfmt \
                --field=1 \
                --to=iec \
            || true

          echo
          echo "============================================================"
          echo "REPOSITORY SIZE"
          echo "============================================================"

          du -sh repo

          echo
          echo "============================================================"
          echo "PERSISTENT BUILDER CACHE SIZE"
          echo "============================================================"

          du -sh .flatpak-builder || true

      # ============================================================
      # Smoke tests
      # ============================================================

      - name: Smoke test native Flatpak
        run: |
          echo "============================================================"
          echo "RetroFE version"
          echo "============================================================"

          flatpak-builder \
            --run \
            build-dir \
            org.coinops.Runtime.yml \
            /app/bin/retrofe \
            --version \
            || true

          echo
          echo "============================================================"
          echo "MAME version"
          echo "============================================================"

          flatpak-builder \
            --run \
            build-dir \
            org.coinops.Runtime.yml \
            /app/bin/mame \
            -version

          echo
          echo "============================================================"
          echo "PATH resolution"
          echo "============================================================"

          flatpak-builder \
            --run \
            build-dir \
            org.coinops.Runtime.yml \
            sh \
            -c '
              echo "$PATH"

              echo
              echo "retrofe:"
              command -v retrofe

              echo
              echo "mame:"
              command -v mame

              echo
              echo "coinops-launcher:"
              command -v coinops-launcher
            '

      # ============================================================
      # Build distributable Flatpak bundle
      # ============================================================

      - name: Build Flatpak bundle
        run: |
          echo "Creating native Flatpak bundle..."

          (
            while true; do
              echo "Still building Flatpak bundle: $(date)"
              sleep 60
            done
          ) &

          HEARTBEAT_PID=$!

          trap \
            'kill "$HEARTBEAT_PID" 2>/dev/null || true' \
            EXIT

          flatpak build-bundle \
            repo \
            CoinOPS-Runtime-Native-x86_64.flatpak \
            org.coinops.Runtime \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo

          kill "$HEARTBEAT_PID" 2>/dev/null || true
          trap - EXIT

          echo
          echo "Bundle complete:"
          ls -lh CoinOPS-Runtime-Native-x86_64.flatpak

          echo
          echo "Bundle byte size:"
          stat \
            --printf='%s bytes\n' \
            CoinOPS-Runtime-Native-x86_64.flatpak

      # ============================================================
      # Upload artifact
      # ============================================================

      - name: Upload native CoinOPS Flatpak
        uses: actions/upload-artifact@v7
        with:
          name: CoinOPS-Runtime-Native-x86_64.flatpak
          path: CoinOPS-Runtime-Native-x86_64.flatpak
          if-no-files-found: error
